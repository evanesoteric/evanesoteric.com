<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>evanesoteric</title>
    <meta name="description" content="Welcome to evanesoteric's digital matrix.">

    <!-- opengraph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="evanesoteric"/>
	<meta property="og:title" content="evanesoteric">
	<meta property="og:url" content="https://evanesoteric.com">
	<meta property="og:image" content="https://evanesoteric.com/assets/img/opengraph.webp"/>
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="evanesoteric.com">
    <meta name="twitter:image" content="https://evanesoteric.com/assets/img/opengraph.webp">
    <meta property="og:image" content="https://evanesoteric.com/assets/img/favicon.webp" />

    <!-- favicon -->
    <link rel="icon" href="assets/img/favicon.webp" type="image/png">

    <!-- dynamic localization -->
    <meta property="og:locale" content="en_US">
</head>
<body>

	<!-- Matrix canvas  -->
	<div class="matrix-container">
	  <canvas id="matrix-canvas"></canvas>
	</div>

	<!-- mainline -->
	<div class="mainline">
		<h1>
	      <span is="type-async" id="type-text"></span>
	  	  <span class="blinking-cursor">_</span>
  	    </h1>
	</div>

	<!-- avatar -->
	<div class="avatar">
		<img src="assets/img/avatar.webp" alt="Avatar">
	</div>

	<!-- infobar -->
	<ul class="infobar">

		<!-- github -->
		<a target="_blank" href="https://github.com/evanesoteric" uk-tooltip="title: Github; pos: bottom;">
		    <li class="infobar-item">
				<div class="">
    			    <img src="assets/img/github.svg" alt="Github">
			    </div>
		    </li>
		</a>

        <!-- email -->
        <a href="mailto:ev@evanesoteric.com" uk-tooltip="title: Email; pos: bottom;">
		    <li class="infobar-item">
				<div class="">
    			    <img src="assets/img/email.svg" alt="Email">
			    </div>
		    </li>
		</a>

		<!-- gpg -->
		<a href="gpg.txt" uk-tooltip="title: GPG; pos: bottom;">
    		<li class="infobar-item">
	    	   <div class="">
    	    		<img src="assets/img/lock.svg" alt="GPG">
		    	</div>
		    </li>
   	    </a>
   	    
	</ul>

</body>
</html>
